apiVersion: apps/v1
kind: Deployment
metadata:
  name: visit-service
spec:
  replicas: 4

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: visit

  template:
    metadata:
      labels:
        app: visit
    spec:
      containers:
        - name: visit
          image: rajeevreddy1511/visit-service-1:v17
          imagePullPolicy: Always
          ports:
            - containerPort: 3001

          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hmis-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hmis-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

          # 🔥 READINESS PROBE
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

          # 🔥 LIVENESS PROBE
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
