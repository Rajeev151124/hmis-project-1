apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
spec:
  replicas: 4

  # ✅ Rolling Update Strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: patient

  template:
    metadata:
      labels:
        app: patient
    spec:
      containers:
        - name: patient
          image: rajeevreddy1511/patient-service-1:v18
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017/hmis
