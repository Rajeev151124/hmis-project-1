apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
spec:
  replicas: 4

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: patient

  template:
    metadata:
      labels:
        app: patient
    spec:
      containers:
        - name: patient
          image: rajeevreddy1511/patient-service-1:v19
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hmis-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hmis-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

          # 🔥 READINESS PROBE (traffic control)
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          # 🔥 LIVENESS PROBE (auto-restart)
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
