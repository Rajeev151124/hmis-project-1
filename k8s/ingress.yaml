apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hmis-ingress
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:

      # Backend APIs
      - path: /patients
        pathType: Prefix
        backend:
          service:
            name: patient-service
            port:
              number: 3000

      - path: /visits
        pathType: Prefix
        backend:
          service:
            name: visit-service
            port:
              number: 3001

      # 🔥 IMPORTANT: Static files
      - path: /app.js
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

      - path: /style.css
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

      # Frontend UI
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
