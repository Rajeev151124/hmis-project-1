<!DOCTYPE html>
<html>
<head>
  <title>HMIS Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>HMIS System</h1>

<div class="nav">
  <button onclick="showPatient()">Patient</button>
  <button onclick="showVisit()">Visit</button>
</div>

<!-- ================= PATIENT SCREEN ================= -->
<div id="patientScreen">
  <h2>Patient Registration</h2>

  <input id="pname" placeholder="Name">
  <input id="page" placeholder="Age">

  <!-- Gender Dropdown -->
  <label>Gender</label>
  <select id="pgender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
  </select>

  <!-- DOB -->
  <label>Date of Birth</label>
  <input type="date" id="pdob">

  <!-- NEW EMAIL FIELD -->
  <input id="pemail" placeholder="Email">

  <input id="pdisease" placeholder="Disease">

  <button onclick="addPatient()">Save Patient</button>

  <h3>Patient List</h3>
  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Disease</th>
        <th>DOB</th>
        <th>Email</th> <!-- NEW -->
      </tr>
    </thead>
    <tbody id="patientTable"></tbody>
  </table>
</div>

<!-- ================= VISIT SCREEN ================= -->
<div id="visitScreen" style="display:none;">
  <h2>Visit Entry</h2>

  <select id="vpatientId">
    <option value="">Select Patient</option>
  </select>

  <input id="vdoctor" placeholder="Doctor">
  <input id="vdate" placeholder="Date">

  <button onclick="addVisit()">Save Visit</button>

  <h3>Visit List</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="visitTable"></tbody>
  </table>
</div>

<!-- Cache busting -->
<script src="/app.js?v=20000"></script>

</body>
</html>
